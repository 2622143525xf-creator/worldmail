<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>查收一封世界的来信</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --outline: #3D2B1F;
    --mailbox-red: #F26440;
    --mailbox-red-dark: #D14E2C;
    --mailbox-red-light: #FF8060;
    --envelope-cream: #FFF5D4;
    --envelope-flap: #F7ECC4;
    --flower-seal: #FFD93D;
    --paper-cream: #FFF9ED;
    --paper-line: #E8D5B0;
    --heart-pink: #FF8FAB;
    --text-dark: #3D2B1F;
    --text-soft: #6B5344;
    --bg-warm: #FFF5DC;
    --cheek-pink: #FF9B9B;
    --crayon-green: #7BC47F;
    --crayon-blue: #73B8FF;
    --crayon-orange: #FFB347;
    --crayon-pink: #FF9BB3;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'ZCOOL KuaiLe', 'Ma Shan Zheng', cursive;
    background: #EDE3CC;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  /* 背景装饰 */
  .doodle {
    position: absolute;
    pointer-events: none;
    z-index: 0;
  }

  /* 四角星 - 黑色描边 */
  .sparkle-outline {
    animation: sparkleBlink 2.5s ease-in-out infinite;
  }

  /* 四角星 - 金色填充闪烁 */
  .sparkle-gold {
    animation: sparkleBlink 2s ease-in-out infinite;
  }

  @keyframes sparkleBlink {
    0%, 100% { opacity: 0.7; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.15); }
  }

  /* 爱心 */
  .heart {
    animation: heartFloat 3.5s ease-in-out infinite;
  }

  @keyframes heartFloat {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50% { transform: translateY(-5px) rotate(5deg); }
  }

  /* 纸张纹理层 */
  .game-container::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at center, rgba(255,255,255,0.5) 0%, rgba(255,245,220,0) 60%),
      radial-gradient(circle at 20% 30%, rgba(255,230,180,0.25) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(255,220,160,0.2) 0%, transparent 40%);
    z-index: 0;
    pointer-events: none;
  }

  /* 纸张颗粒噪点 */
  .game-container::after {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.03;
    z-index: 0;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  .game-container {
    position: relative;
    width: 800px;
    height: 600px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg-warm);
    border-radius: 12px;
    overflow: hidden;
    z-index: 1;
  }

  .game-title {
    position: absolute;
    top: 40px;
    font-size: 2rem;
    color: var(--text-dark);
    letter-spacing: 4px;
    z-index: 10;
    opacity: 0;
    animation: fadeInDown 1s ease forwards;
    animation-delay: 0.3s;
    text-shadow: none;
  }

  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ============ 邮箱场景 ============ */
  .mailbox-scene {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.5s ease;
    z-index: 1;
  }

  .mailbox-wrapper {
    position: relative;
    width: 300px;
    height: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
  }

  /* 花束装饰 - 花冠覆盖邮箱上半部 */
  .flower-bouquet {
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    width: 340px;
    height: 220px;
    z-index: 5;
    pointer-events: none;
  }

  .flower-side {
    position: absolute;
    top: 10px;
    width: 200px;
    height: 160px;
    z-index: 4;
    pointer-events: none;
  }

  .flower-side-left {
    left: -60px;
  }

  .flower-side-right {
    right: -60px;
  }

  /* ============ 卡通邮筒 ============ */
  .mailbox {
    position: relative;
    width: 220px;
    height: 380px;
    z-index: 3;
  }

  /* 邮筒底座三层 */
  .mailbox-base {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 260px;
    height: 0;
    z-index: 1;
  }

  .mailbox-base::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 260px;
    height: 22px;
    background: var(--mailbox-red-dark);
    border-radius: 6px;
    border: 4px solid var(--outline);
  }

  .mailbox-base::after {
    content: '';
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    width: 230px;
    height: 16px;
    background: var(--mailbox-red);
    border-radius: 4px;
    border: 4px solid var(--outline);
    border-bottom: none;
  }

  /* 邮筒主体 */
  .mailbox-body {
    position: absolute;
    top: 55px;
    bottom: 34px;
    left: 10px;
    right: 10px;
    background: var(--mailbox-red);
    border: 5px solid var(--outline);
    border-radius: 6px;
    z-index: 2;
  }

  /* 邮筒主体高光 */
  .mailbox-body::before {
    content: '';
    position: absolute;
    top: 10px;
    left: 12px;
    width: 30px;
    height: calc(100% - 20px);
    background: rgba(255,255,255,0.25);
    border-radius: 20px;
  }

  /* 邮筒顶部环带 */
  .mailbox-body::after {
    content: '';
    position: absolute;
    top: -5px;
    left: -5px;
    right: -5px;
    height: 14px;
    background: var(--mailbox-red-dark);
    border: 5px solid var(--outline);
    border-radius: 8px 8px 0 0;
  }

  /* 邮筒圆顶 */
  .mailbox-top {
    position: absolute;
    top: 0;
    left: -5px;
    right: -5px;
    height: 60px;
    background: var(--mailbox-red);
    border: 5px solid var(--outline);
    border-bottom: none;
    border-radius: 50% 50% 0 0;
    z-index: 3;
  }

  .mailbox-top::before {
    content: '';
    position: absolute;
    top: 8px;
    left: 15px;
    width: 25px;
    height: 20px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
  }

  /* 顶部装饰小点 */
  .mailbox-top::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 15px;
    right: 15px;
    height: 8px;
    background:
      radial-gradient(circle, var(--mailbox-red-dark) 3px, transparent 3.5px) 0 0 / 20px 8px repeat-x;
  }

  /* 投信口 */
  .mail-slot {
    position: absolute;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    width: 140px;
    height: 16px;
    background: #5C4033;
    border: 3px solid var(--outline);
    border-radius: 4px;
    z-index: 5;
  }

  /* 邮箱文字 - POST（投信口上方） */
  .mailbox-text {
    position: absolute;
    top: 45px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 5;
  }

  .mailbox-text .chinese {
    display: none;
  }

  .mailbox-text .english {
    font-family: 'ZCOOL KuaiLe', cursive;
    font-size: 1.8rem;
    color: #fff;
    letter-spacing: 4px;
    text-shadow: 2px 2px 0 var(--outline);
    font-weight: normal;
    -webkit-text-stroke: 0;
  }

  /* 邮箱内部黑暗区域 */
  .mailbox-inside {
    position: absolute;
    bottom: 10px;
    left: 15px;
    right: 15px;
    height: 120px;
    background: #3D2318;
    border: 3px solid var(--outline);
    border-radius: 6px;
    overflow: hidden;
    z-index: 3;
  }

  /* 邮箱门 */
  .mailbox-door {
    position: absolute;
    bottom: 10px;
    left: 15px;
    right: 15px;
    height: 120px;
    background: var(--mailbox-red);
    border: 4px solid var(--outline);
    border-radius: 6px;
    transform-origin: top center;
    transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 4;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .mailbox-door:hover {
    filter: brightness(1.08);
  }

  .mailbox-door.open {
    transform: rotateX(-110deg);
    pointer-events: none;
  }

  /* 门把手 - 小圆点 */
  .mailbox-door::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 14px;
    transform: translateY(-50%);
    width: 12px;
    height: 12px;
    background: var(--outline);
    border-radius: 50%;
    box-shadow: inset -2px -2px 0 rgba(255,255,255,0.2);
  }

  .door-label {
    font-family: 'ZCOOL KuaiLe', cursive;
    font-size: 1.15rem;
    color: var(--outline);
    letter-spacing: 3px;
    padding-left: 25px;
    user-select: none;
    position: relative;
    display: inline-block;
    animation: textBlink 1.5s ease-in-out infinite;
    white-space: nowrap;
  }

  .door-label::before,
  .door-label::after {
    content: '✦';
    position: absolute;
    font-size: 0.6rem;
    color: var(--flower-seal);
    animation: starBlink 1.2s ease-in-out infinite;
    text-shadow: 0 0 6px rgba(255, 217, 61, 0.7);
  }

  .door-label::before {
    top: -6px;
    left: -6px;
    animation-delay: 0s;
  }

  .door-label::after {
    bottom: -4px;
    right: -4px;
    animation-delay: 0.6s;
  }

  @keyframes textBlink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  @keyframes starBlink {
    0%, 100% { opacity: 0.4; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  .mailbox-door.open .door-label {
    opacity: 0;
  }

  /* ============ 信封 ============ */
  .envelope {
    position: relative;
    width: 200px;
    height: 140px;
    cursor: pointer;
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .envelope-body {
    position: absolute;
    inset: 0;
    background: var(--envelope-cream);
    border: 4px solid var(--outline);
    border-radius: 8px;
    overflow: hidden;
  }

  /* 信封封口三角形 */
  .envelope-flap {
    position: absolute;
    top: -2px;
    left: -2px;
    right: -2px;
    height: 75px;
    background: var(--envelope-flap);
    border: 4px solid var(--outline);
    border-bottom: none;
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    transform-origin: top center;
    transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 5;
  }

  .envelope.open .envelope-flap {
    transform: rotateX(180deg);
  }

  /* 信封底部三角 */
  .envelope-left,
  .envelope-right {
    position: absolute;
    bottom: -2px;
    width: 52%;
    height: 72px;
    background: var(--envelope-flap);
    z-index: 4;
  }

  .envelope-left {
    left: -2px;
    border-left: 4px solid var(--outline);
    border-bottom: 4px solid var(--outline);
    clip-path: polygon(0 0, 0 100%, 100% 100%);
    border-radius: 0 0 0 8px;
  }

  .envelope-right {
    right: -2px;
    border-right: 4px solid var(--outline);
    border-bottom: 4px solid var(--outline);
    clip-path: polygon(100% 0, 0 100%, 100% 100%);
    border-radius: 0 0 8px 0;
  }

  /* 小花封蜡 */
  .heart-sticker {
    position: absolute;
    top: 48%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 36px;
    height: 36px;
    z-index: 6;
    transition: opacity 0.3s ease;
  }

  .envelope.open .heart-sticker {
    opacity: 0;
  }

  /* ============ 信封全屏 ============ */
  .envelope-fullscene {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s ease;
    background: rgba(255, 248, 231, 0.6);
  }

  .envelope-fullscene.active {
    pointer-events: all;
    opacity: 1;
  }

  .envelope-large {
    width: 480px;
    height: 340px;
    position: relative;
    transform: scale(0.3);
    opacity: 0;
    transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    perspective: 1000px;
    clip-path: inset(-60% 0 0 0);
  }

  .envelope-large.show {
    transform: scale(1);
    opacity: 1;
  }

  .envelope-large .envelope-body {
    position: absolute;
    inset: 0;
    background: var(--envelope-cream);
    border: 5px solid var(--outline);
    border-radius: 10px;
  }

  .envelope-large .envelope-flap {
    height: 52%;
    border-width: 5px;
  }

  .envelope-large .envelope-left,
  .envelope-large .envelope-right {
    height: 52%;
    border-width: 5px;
  }

  .envelope-large .heart-sticker {
    width: 56px;
    height: 56px;
    transition: opacity 0.3s ease;
  }

  .envelope-large.opened .envelope-flap {
    transform: rotateX(180deg);
    z-index: 1;
  }

  .envelope-large.opened .heart-sticker {
    opacity: 0;
  }

  /* 信纸 */
  .letter-paper {
    position: absolute;
    left: 4%;
    right: 4%;
    bottom: -60%;
    height: 110%;
    background: var(--paper-cream);
    border: 3px solid var(--outline);
    border-radius: 6px;
    z-index: 3;
    overflow: hidden;
    opacity: 0;
    transition: all 0s;
  }

  .envelope-large.opened .letter-paper {
    bottom: 0%;
    opacity: 1;
    transition: bottom 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.8s ease;
  }

  .letter-paper::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(
        transparent,
        transparent 31px,
        var(--paper-line) 31px,
        var(--paper-line) 32px
      );
    opacity: 0.4;
    pointer-events: none;
  }

  .letter-content {
    position: absolute;
    inset: 32px 28px 24px;
    color: var(--text-dark);
    font-family: 'ZCOOL KuaiLe', cursive;
    font-size: 1.1rem;
    line-height: 32px;
    overflow-y: auto;
    padding-right: 8px;
    opacity: 0;
    transition: opacity 0.8s ease;
    transition-delay: 0.8s;
  }

  .envelope-large.opened .letter-content {
    opacity: 1;
  }

  .letter-content::-webkit-scrollbar { width: 4px; }
  .letter-content::-webkit-scrollbar-track { background: transparent; }
  .letter-content::-webkit-scrollbar-thumb { background: var(--paper-line); border-radius: 2px; }

  .letter-greeting {
    text-align: left;
    margin-bottom: 2px;
    font-size: 1.3rem;
  }

  .letter-opening {
    text-indent: 2em;
    margin-bottom: 16px;
  }

  .letter-body {
    text-indent: 2em;
    margin-bottom: 16px;
  }

  .letter-body p {
    margin-bottom: 12px;
    line-height: 32px;
  }

  .letter-signature {
    text-align: right;
    margin-top: 8px;
    font-size: 1.1rem;
  }

  .letter-hashtag {
    text-align: center;
    margin-top: 16px;
    font-size: 0.85rem;
    color: var(--text-soft);
    letter-spacing: 1px;
    font-family: 'ZCOOL KuaiLe', cursive;
    opacity: 0;
    transition: opacity 0.6s ease;
    transition-delay: 1.5s;
    white-space: nowrap;
  }

  .envelope-large.opened .letter-hashtag {
    opacity: 0.85;
  }

  .hashtag-tag {
    color: var(--heart-pink);
    font-weight: bold;
  }

  /* ============ 给自己写信场景 ============ */
  .write-letter-scene {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s ease;
    background: rgba(255, 248, 231, 0.75);
  }

  .write-letter-scene.active {
    pointer-events: all;
    opacity: 1;
  }

  .write-letter-paper {
    width: 420px;
    height: 520px;
    background: var(--paper-cream);
    border: 3px solid var(--outline);
    border-radius: 8px;
    position: relative;
    box-shadow: 0 6px 30px rgba(61, 43, 31, 0.12);
    transform: rotate(-1deg);
    padding: 40px 36px 36px;
    display: flex;
    flex-direction: column;
  }

  .write-letter-paper::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(
        transparent,
        transparent 31px,
        var(--paper-line) 31px,
        var(--paper-line) 32px
      );
    opacity: 0.35;
    pointer-events: none;
    border-radius: 8px;
  }

  .write-letter-title {
    font-family: 'ZCOOL KuaiLe', cursive;
    font-size: 1.35rem;
    color: var(--heart-pink);
    text-align: center;
    margin-bottom: 28px;
    position: relative;
    z-index: 1;
  }

  .write-letter-text {
    position: relative;
    z-index: 1;
    flex: 1;
  }

  .write-dear {
    font-family: 'ZCOOL KuaiLe', cursive;
    font-size: 1.1rem;
    color: var(--text-dark);
    line-height: 32px;
    margin: 0 0 16px 0;
  }

  .write-body {
    font-family: 'ZCOOL KuaiLe', cursive;
    font-size: 1.1rem;
    color: var(--text-dark);
    line-height: 32px;
    margin: 0;
    text-indent: 2em;
  }

  .write-letter-back {
    margin-top: 24px;
    padding: 8px 28px;
    background: var(--envelope-cream);
    border: 2px solid var(--outline);
    border-radius: 20px;
    font-family: 'ZCOOL KuaiLe', cursive;
    font-size: 0.95rem;
    color: var(--text-dark);
    cursor: pointer;
    transition: all 0.2s ease;
    z-index: 1;
  }

  .write-letter-back:hover {
    background: var(--paper-cream);
    transform: scale(1.05);
  }

  /* ============ 音效按钮 ============ */
  .audio-toggle {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.8);
    border: 3px solid var(--outline);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    transition: all 0.3s ease;
  }

  .audio-toggle:hover {
    background: #fff;
    transform: scale(1.08);
  }

  .audio-toggle svg {
    width: 22px;
    height: 22px;
    fill: var(--text-dark);
  }

  .bgm-credit {
    position: fixed;
    bottom: 6px;
    right: 10px;
    font-size: 10px;
    color: rgba(61,43,31,0.4);
    z-index: 0;
    pointer-events: none;
  }
  .bgm-credit a {
    color: rgba(61,43,31,0.4);
    pointer-events: auto;
  }
  .bgm-credit a:hover {
    color: rgba(61,43,31,0.7);
  }

  /* ============ 按钮组 ============ */
  .envelope-actions {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 30px;
    opacity: 0;
    transition: opacity 0.5s ease;
    transition-delay: 1.5s;
  }

  .envelope-large.opened ~ .envelope-actions {
    opacity: 1;
  }

  .restart-btn {
    padding: 8px 4px;
    font-size: 1.05rem;
    font-family: 'ZCOOL KuaiLe', cursive;
    color: var(--outline);
    background: none;
    border: none;
    border-bottom: 3px solid var(--heart-pink);
    border-radius: 0;
    cursor: pointer;
    letter-spacing: 2px;
    white-space: nowrap;
    transition: all 0.3s ease;
  }

  .restart-btn:hover {
    background: none;
    transform: translateY(-2px);
    border-bottom-color: var(--cheek-pink);
  }

  /* ============ 漂浮信封 ============ */
  .envelope-floating {
    position: absolute;
    top: 50%;
    left: 50%;

<script>
(function() {

    {

    },
    {
      body: '人生的路上我们总在边走边丢。你曾经主动放弃过什么人、什么事？是一段走散了的关系，一个搁置很久的爱好，还是一种没敢选择的可能性？直到今天，你还会偶尔想起它吗？其实每一次放下，都是另一种形式的成长呀。'
    },
    {
      body: '命运的转弯总藏在不经意的瞬间。你人生里有没有一个"差一点就变了"的时刻？是差一点选了另一条路，差一点留住某个人，差一点就成了另一个自己？想想真是奇妙，那么微小的一个瞬间，就悄悄改写了后来的全部故事。'

    {

    {

    {
      body: '有些心事藏了很多年，终于在某天悄悄和解。有哪件委屈或遗憾，你揣了很久，如今终于能笑着拍拍当年的自己，轻轻说一句"没关系"了？能放下的那一刻，你是不是也觉得，心里轻轻的，像放下了一块大石头。'

    }
  ];

  let gameState = {
    currentState: 'cover',
    isAnimating: false,
    audioEnabled: true,
    audioContext: null
  };

  const envelopeFloating = document.getElementById('envelopeFloating');

  const envelopeLarge = document.getElementById('envelopeLarge');

  const restartBtn = document.getElementById('restartBtn');
  const writeLetterBtn = document.getElementById('writeLetterBtn');
  const audioToggle = document.getElementById('audioToggle');
  const audioOnIcon = document.getElementById('audioOnIcon');
  const audioOffIcon = document.getElementById('audioOffIcon');
  const bgm = document.getElementById('bgm');
  bgm.volume = 0.3;
  const writeLetterScene = document.getElementById('writeLetterScene');
  const writeLetterBack = document.getElementById('writeLetterBack');

  function initAudio() {
    if (!gameState.audioContext) {
      gameState.audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (gameState.audioContext.state === 'suspended') {
      gameState.audioContext.resume();
    }
    if (gameState.audioEnabled && bgm.paused) {
      bgm.play().catch(function() {});
    }
  }

  function playEnvelopeOpenSound() {
    if (!gameState.audioEnabled || !gameState.audioContext) return;
    const ctx = gameState.audioContext;
    const now = ctx.currentTime;
    const duration = 0.5;
    const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * duration, ctx.sampleRate);
    const data = noiseBuffer.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      const t = i / data.length;
      const envelope = Math.sin(t * Math.PI);
      data[i] = (Math.random() * 2 - 1) * envelope * (0.3 + 0.7 * Math.sin(t * 20));
    }
    const noise = ctx.createBufferSource();
    noise.buffer = noiseBuffer;
    const filter = ctx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.setValueAtTime(2000, now);
    filter.frequency.linearRampToValueAtTime(4000, now + duration);
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.12, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
    noise.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);
    noise.start(now);
  }

  function playClickSound() {
    if (!gameState.audioEnabled || !gameState.audioContext) return;
    const ctx = gameState.audioContext;
    const now = ctx.currentTime;
    const noise = ctx.createBufferSource();
    const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 0.08, ctx.sampleRate);
    const data = noiseBuffer.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 2);
    }
    noise.buffer = noiseBuffer;
    const noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(0.12, now);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
    noise.connect(noiseGain);
    noiseGain.connect(ctx.destination);
    noise.start(now);
    const osc = ctx.createOscillator();
    const oscGain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(600, now);
    osc.frequency.exponentialRampToValueAtTime(1200, now + 0.04);
    osc.frequency.exponentialRampToValueAtTime(400, now + 0.08);
    oscGain.gain.setValueAtTime(0.1, now);
    oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    osc.connect(oscGain);
    oscGain.connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 0.1);
  }

  function toggleAudio() {
    gameState.audioEnabled = !gameState.audioEnabled;
    audioOnIcon.style.display = gameState.audioEnabled ? 'block' : 'none';
    audioOffIcon.style.display = gameState.audioEnabled ? 'none' : 'block';
    if (gameState.audioEnabled) {
      bgm.play().catch(function() {});
    } else {
      bgm.pause();
    }
  }

  let lastLetterIndex = -1;

  function getRandomLetter() {
    let index;
    do {
      const array = new Uint32Array(1);
      crypto.getRandomValues(array);
      index = array[0] % letters.length;
    } while (index === lastLetterIndex && letters.length > 1);
    lastLetterIndex = index;
    return letters[index];
  }

  function openMailbox() {
    if (gameState.isAnimating || gameState.currentState !== 'cover') return;
    gameState.isAnimating = true;
    initAudio();
    playClickSound();
    setTimeout(() => {
      mailboxDoor.classList.add('open');
      setTimeout(() => {
        envelopeFloating.classList.add('show');
        gameState.currentState = 'letter-appear';
        gameState.isAnimating = false;
      }, 600);
    }, 200);
  }

  function openEnvelopeLarge() {
    if (gameState.isAnimating || gameState.currentState !== 'letter-appear') return;
    gameState.isAnimating = true;
    playClickSound();
    const letter = getRandomLetter();
    letterBody.innerHTML = `<p>${letter.body}</p>`;
    envelopeFullscene.classList.add('active');
    requestAnimationFrame(() => {
      envelopeLarge.classList.add('show');
    });
    setTimeout(() => {
      gameState.currentState = 'envelope-full';
      gameState.isAnimating = false;
    }, 800);
  }

  function openEnvelope() {
    if (gameState.isAnimating || gameState.currentState !== 'envelope-full') return;
    gameState.isAnimating = true;
    playEnvelopeOpenSound();
    envelopeLarge.classList.add('opened');
    setTimeout(() => {
      gameState.currentState = 'letter-revealed';
      gameState.isAnimating = false;
    }, 1500);
  }

  function restartGame() {
    if (gameState.isAnimating) return;
    gameState.isAnimating = true;
    playClickSound();
    envelopeLarge.classList.remove('opened');
    envelopeLarge.classList.remove('show');
    setTimeout(() => {
      envelopeFullscene.classList.remove('active');
      mailboxDoor.classList.remove('open');
      mailboxDoor.style.pointerEvents = '';
      envelopeFloating.classList.remove('show');
      const letter = getRandomLetter();
      letterBody.innerHTML = `<p>${letter.body}</p>`;
      gameState.currentState = 'cover';
      gameState.isAnimating = false;
    }, 800);
  }

  mailboxDoor.addEventListener('click', openMailbox);
  envelopeFloating.addEventListener('click', function(e) {
    if (gameState.currentState === 'letter-appear') {
      openEnvelopeLarge();
    }
  });
  envelopeLarge.addEventListener('click', function(e) {
    if (e.target === restartBtn || e.target === writeLetterBtn) return;
    if (gameState.currentState === 'envelope-full') {
      openEnvelope();
    }
  });
  restartBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    restartGame();
  });
  writeLetterBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    writeLetterScene.classList.add('active');
  });
  writeLetterBack.addEventListener('click', function(e) {
    e.stopPropagation();
    writeLetterScene.classList.remove('active');
    restartGame();
  });
  audioToggle.addEventListener('click', function() {
    initAudio();
    toggleAudio();
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      if (gameState.currentState === 'cover') openMailbox();
      else if (gameState.currentState === 'letter-appear') openEnvelopeLarge();
      else if (gameState.currentState === 'envelope-full') openEnvelope();
    }
  });
})();
</script>
</body>
</html>
